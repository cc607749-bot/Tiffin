    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Stock Deal & Order Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; margin-bottom: 20px; border-radius: 12px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #00e676; }
        .loader { display: none; text-align: center; margin: 50px 0; }
        .text-success { color: #00e676 !important; }
        .text-danger { color: #ff1744 !important; }
        .badge-deal { background-color: #00e676; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row text-center mb-4">
            <div class="col">
                <h1 class="fw-bold text-warning">📈 Mega Stock Deal & Order Tracker</h1>
                <p class="text-muted">Yeh website 35+ High-Order Stocks ko scan karke unhe select karti hai jinki haal hi me koi Deal ya Project news aayi ho.</p>
                <button id="scanBtn" class="btn btn-warning btn-lg mt-2 fw-bold px-5">🚀 Run Deep Scan Now</button>
            </div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner-border text-warning" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-warning fs-5" id="loaderText">Starting deep market scan...</p>
        </div>

        <div class="row pt-4" id="stockContainer">
            </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "QUxMIFPVVlgqFTRSBBUkUgQkVMT("; // Apni API key conform rakhein
        const PROXY_URL = "https://api.allorigins.win/raw?url="; 
        const BASE_URL = "https://stock.indianapi.in";
        
        // India ke sabse zyada order aur project paane wale top 35+ stocks ki list
        const BIG_STOCK_LIST = [
            "Tata Power", "Reliance", "L&T", "Suzlon", "BHEL", "Adani Green", "KPI Green", 
            "HFCL", "Mazagon Dock", "RVNL", "IRCON", "NHPC", "SJVN", "NTPC", "Power Grid", 
            "GMR Infra", "IRFC", "BEL", "HAL", "Cochin Shipyard", "NBCC", "Railtel", 
            "Texmaco Rail", "Titagarh", "JWL", "Tata Steel", "JINDALSTEL", "Adani Power", 
            "JSW Energy", "Inox Wind", "Sterling Wilson", "Ahluwalia", "KEC International", "Kalpataru"
        ];

        document.getElementById('scanBtn').addEventListener('click', scanBulkMarket);
        window.onload = scanBulkMarket;

        async function scanBulkMarket() {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const container = document.getElementById('stockContainer');
            
            loader.style.display = 'block';
            container.innerHTML = '';

            let companyFound = false;

            // Broad keywords jo news me milte hi stock ko trigger kar denge
            const keywords = ["order", "deal", "project", "contract", "awarded", "secures", "mou", "agreement", "crore", "cr", "loi", "acquisition", "win", "wins"];

            // Ek-ek karke saare stocks background me scan honge
            for (let i = 0; i < BIG_STOCK_LIST.length; i++) {
                const stock = BIG_STOCK_LIST[i];
                
                // Real-time status update loader text me dikhega
                loaderText.innerText = `Scanning (${i+1}/${BIG_STOCK_LIST.length}): ${stock}...`;

                try {
                    const targetUrl = encodeURIComponent(`${BASE_URL}/stock?name=${stock}`);
                    const url = `${PROXY_URL}${targetUrl}`;
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'x-api-key': API_KEY,
                            'Accept': 'application/json'
                        }
                    });

                    if (response.status === 200) {
                        const data = await response.json();
                        const currentPrice = data.currentPrice || "N/A";
                        const percentChange = data.percentChange || 0;
                        const recentNews = data.recentNews || [];

                        let matchingDeals = [];

                        recentNews.forEach(news => {
                            const title = (news.title || "").toLowerCase();
                            const desc = (news.description || "").toLowerCase();

                            if (keywords.some(kw => title.includes(kw) || desc.includes(kw))) {
                                matchingDeals.push({
                                    title: news.title,
                                    date: news.date || "Recent News",
                                    url: news.url || "#"
                                });
                            }
                        });

                        // Selection Logic: Agar is stock ki koi bhi order/deal wali news mili, toh card banao
                        if (matchingDeals.length > 0) {
                            companyFound = true;
                            const changeClass = parseFloat(percentChange) >= 0 ? 'text-success' : 'text-danger';
                            
                            let dealListHTML = '';
                            matchingDeals.forEach(deal => {
                                dealListHTML += `
                                    <li class="list-group-item bg-dark text-light border-secondary">
                                        <span class="badge badge-deal mb-1">PROJECT / ORDER</span><br>
                                        <a href="${deal.url}" target="_blank" class="text-decoration-none text-info fw-semibold">
                                            📢 ${deal.title}
                                        </a> <br>
                                        <small class="text-white-50">Date: ${deal.date}</small>
                                    </li>`;
                            });

                            const cardHTML = `
                                <div class="col-md-6 col-lg-4">
                                    <div class="card shadow-lg h-100">
                                        <div class="card-body d-flex flex-column justify-content-between">
                                            <div>
                                                <h5 class="card-title text-warning fw-bold">${stock}</h5>
                                                <div class="d-flex justify-content-between mb-3">
                                                    <span>Price: <strong>₹${currentPrice}</strong></span>
                                                    <span class="${changeClass} fw-bold">${percentChange}%</span>
                                                </div>
                                                <h6 class="text-success border-bottom pb-2">🎯 Selected Announcements:</h6>
                                                <ul class="list-group list-group-flush">
                                                    ${dealListHTML}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            container.innerHTML += cardHTML;
                        }
                    }
                } catch (error) {
                    console.error(`Error scanning ${stock}:`, error);
                }
            }

            loader.style.display = 'none';

            if (!companyFound) {
                container.innerHTML = `
                    <div class="col-12 text-center">
                        <p class="text-muted fs-5">Sari 35+ companies scan ho gayi, par filhaal kisi ke recent news me deal/order filter match nahi hua.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
