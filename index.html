 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Stock Deal & Order Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; margin-bottom: 20px; border-radius: 12px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #00e676; }
        .loader { display: none; text-align: center; margin: 50px 0; }
        .badge-deal { background-color: #00e676; color: #000; font-weight: bold; font-size: 0.8rem; }
        .badge-company { background-color: #ff9100; color: #000; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row text-center mb-4">
            <div class="col">
                <h1 class="fw-bold text-success">🎯 Automatic Stock Deal & Project Scanner</h1>
                <p class="text-muted">Yeh website Indian Stock API ke Announcements Board ko scan karke un sabhi companies ko select karti hai jinki koi Deal, Order ya Project chal raha hai.</p>
                <button id="scanBtn" class="btn btn-success btn-lg mt-2 fw-bold px-5">🔍 Scan Live Announcements</button>
            </div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-success fs-5">Scanning full market announcements for mega deals...</p>
        </div>

        <div class="row pt-4" id="stockContainer">
            </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "QUxMIFPVVlgqFTRSBBUkUgQkVMT("; // Aapki di hui API Key
        const PROXY_URL = "https://api.allorigins.win/raw?url="; 
        const BASE_URL = "https://stock.indianapi.in";

        document.getElementById('scanBtn').addEventListener('click', scanAnnouncements);
        window.onload = scanAnnouncements;

        async function scanAnnouncements() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('stockContainer');
            
            loader.style.display = 'block';
            container.innerHTML = '';

            let companyFound = false;

            // Strict keywords jo deal aur orders ko select karein
            const keywords = ["order", "deal", "project", "contract", "awarded", "secures", "mou", "crore", "cr", "acquisition", "allotment"];

            try {
                // Hum individual stock ke badle poore market ke recent announcements ka endpoint hit kar rahe hain
                const targetUrl = encodeURIComponent(`${BASE_URL}/recent_announcements`);
                const url = `${PROXY_URL}${targetUrl}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'x-api-key': API_KEY,
                        'Accept': 'application/json'
                    }
                });

                if (response.status === 200) {
                    const announcementsList = await response.json();

                    // Agar API array bhejti hai toh loop chalega
                    if (Array.isArray(announcementsList) && announcementsList.length > 0) {
                        
                        announcementsList.forEach(announcement => {
                            const title = (announcement.title || "").toLowerCase();
                            const desc = (announcement.description || "").toLowerCase();
                            const companyName = announcement.companyName || announcement.symbol || "Unknown Company";

                            // Selection Trigger: Agar title ya desc me order/deal keyword mila
                            if (keywords.some(kw => title.includes(kw) || desc.includes(kw))) {
                                companyFound = true;
                                
                                const cardHTML = `
                                    <div class="col-md-6 col-lg-4">
                                        <div class="card shadow-lg h-100">
                                            <div class="card-body d-flex flex-column justify-content-between">
                                                <div>
                                                    <span class="badge badge-company mb-2">${companyName}</span>
                                                    <br>
                                                    <span class="badge badge-deal mb-3">🎯 SELECTED VIA DEAL</span>
                                                    <p class="card-text fw-semibold text-white">📢 ${announcement.title}</p>
                                                    ${announcement.description ? `<p class="text-white-50 small">${announcement.description}</p>` : ''}
                                                </div>
                                                <div class="mt-3 border-top pt-2">
                                                    <small class="text-muted d-block">🗓️ Date: ${announcement.date || 'Recent'}</small>
                                                    ${announcement.url ? `<a href="${announcement.url}" target="_blank" class="btn btn-sm btn-outline-info mt-2 w-100">Read Official PDF / Source</a>` : ''}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                                container.innerHTML += cardHTML;
                            }
                        });
                    }
                }
            } catch (error) {
                console.error("Error scanning announcements:", error);
            }

            loader.style.display = 'none';

            if (!companyFound) {
                container.innerHTML = `
                    <div class="col-12 text-center">
                        <p class="text-muted fs-5">Filhaal API ke recent announcements me koi bhi order ya deal wali company match nahi hui. Kuch der baad market khulne par check karein.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
