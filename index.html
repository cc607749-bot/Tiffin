<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock 60-Day Deal & Project Tracker</title>
    <!-- Bootstrap CSS for Dark Mode styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; margin-bottom: 20px; border-radius: 12px; }
        .loader { display: none; text-align: center; margin: 50px 0; }
        .text-success { color: #00e676 !important; }
        .text-danger { color: #ff1744 !important; }
        .badge-deal { background-color: #ff9100; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row text-center mb-4">
            <div class="col">
                <h1 class="fw-bold text-warning">📈 Historical Stock Deal & Order Tracker</h1>
                <p class="text-muted">Pichle 60 Days mein jin companies ko naye Orders, Deals ya Projects mile hain, yeh unhe automatic select karta hai.</p>
                <button id="scanBtn" class="btn btn-warning btn-lg mt-2 fw-bold">📊 Scan Last 60 Days Data</button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loader" id="loader">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2 text-warning">Analyzing 60-day historical news and announcements (Bypassing CORS)...</p>
        </div>

        <!-- Stock Results Row -->
        <div class="row pt-4" id="stockContainer">
            <!-- Data JavaScript se yahan load hoga -->
        </div>
    </div>

    <!-- JavaScript code for Historical Filter with CORS Bypass -->
    <script>
        // --- CONFIGURATION ---
        const API_KEY = "QUxMIFPVVlgqFTRSBBUkUgQkVMT("; // Apni complete API key check kar lein
        
        // CORS proxy lagaya hai taaki browser request block na kare
        const PROXY_URL = "https://cors-anywhere.herokuapp.com/"; 
        const BASE_URL = "https://stock.indianapi.in";
        
        // Testing ke liye wahi heavy order wale stocks
        const TRACKED_STOCKS = ["Tata Power", "Reliance", "L&T", "Suzlon", "BHEL", "Adani Green", "KPI Green", "HFCL", "Mazagon Dock"];

        document.getElementById('scanBtn').addEventListener('click', scanHistoricalMarket);
        window.onload = scanHistoricalMarket;

        async function scanHistoricalMarket() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('stockContainer');
            
            loader.style.display = 'block';
            container.innerHTML = '';

            let companyFound = false;

            // Broad keywords takki pichle 60 din ki koi bhi badi news match ho jaye
            const keywords = ["order", "deal", "project", "contract", "awarded", "secures", "mou", "agreement", "crore", "cr", "loi", "acquisition"];

            for (const stock of TRACKED_STOCKS) {
                try {
                    // CORS Proxy ke saath URL block nahi hoga
                    const url = `${PROXY_URL}${BASE_URL}/stock?name=${encodeURIComponent(stock)}`;
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'x-api-key': API_KEY,
                            'Accept': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });

                    if (response.status === 200) {
                        const data = await response.json();
                        const currentPrice = data.currentPrice || "N/A";
                        const percentChange = data.percentChange || 0;
                        const recentNews = data.recentNews || [];

                        let historicalDeals = [];

                        recentNews.forEach(news => {
                            const title = (news.title || "").toLowerCase();
                            const desc = (news.description || "").toLowerCase();
                            
                            // API ki saari recent news (jo aamtaur par pichle 30-60 dino ki hoti hain) ko seedhe check kar rahe hain
                            if (keywords.some(kw => title.includes(kw) || desc.includes(kw))) {
                                historicalDeals.push({
                                    title: news.title,
                                    date: news.date || "Pichle 60 Days me",
                                    url: news.url || "#"
                                });
                            }
                        });

                        // Agar koi deal/project mila, toh card dikhega
                        if (historicalDeals.length > 0) {
                            companyFound = true;
                            const changeClass = parseFloat(percentChange) >= 0 ? 'text-success' : 'text-danger';
                            
                            let dealListHTML = '';
                            historicalDeals.forEach(deal => {
                                dealListHTML += `
                                    <li class="list-group-item bg-dark text-light border-secondary">
                                        <span class="badge badge-deal mb-1">DEAL / ORDER</span><br>
                                        <a href="${deal.url}" target="_blank" class="text-decoration-none text-info fw-semibold">
                                            📢 ${deal.title}
                                        </a> <br>
                                        <small class="text-white-50">Date: ${deal.date}</small>
                                    </li>`;
                            });

                            const cardHTML = `
                                <div class="col-md-6 col-lg-4">
                                    <div class="card shadow-lg">
                                        <div class="card-body">
                                            <h5 class="card-title text-warning fw-bold">${stock}</h5>
                                            <div class="d-flex justify-content-between mb-3">
                                                <span>Price: <strong>₹${currentPrice}</strong></span>
                                                <span class="${changeClass} fw-bold">${percentChange}%</span>
                                            </div>
                                            <h6 class="text-success border-bottom pb-2">🎯 60-Day Historical Trigger:</h6>
                                            <ul class="list-group list-group-flush">
                                                ${dealListHTML}
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            `;
                            container.innerHTML += cardHTML;
                        }
                    }
                } catch (error) {
                    console.error(`Error scanning ${stock}:`, error);
                }
            }

            loader.style.display = 'none';

            if (!companyFound) {
                container.innerHTML = `
                    <div class="col-12 text-center">
                        <p class="text-muted fs-5">Pichle 60 dino mein in tracked stocks ki koi naye orders ya deals nahi mile ya API response me issue hai.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
