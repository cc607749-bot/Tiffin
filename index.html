<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Deal & Project Tracker</title>
    <!-- Bootstrap CSS for Dark Mode styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; margin-bottom: 20px; border-radius: 12px; }
        .loader { display: none; text-align: center; margin: 50px 0; }
        .text-success { color: #00e676 !important; }
        .text-danger { color: #ff1744 !important; }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row text-center mb-4">
            <div class="col">
                <h1 class="fw-bold text-warning">📈 Live Stock Deal & Order Tracker</h1>
                <p class="text-muted">Yeh website Indian Stock API se direct data lekar un companies ko select karti hai jinki koi current Deal, Project ya Order aaya ho.</p>
                <button id="scanBtn" class="btn btn-warning btn-lg mt-2 fw-bold">🔄 Scan Live Market</button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loader" id="loader">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2 text-warning">Scanning stocks for active deals & orders...</p>
        </div>

        <!-- Stock Results Row -->
        <div class="row pt-4" id="stockContainer">
            <!-- Data JavaScript se yahan load hoga -->
        </div>
    </div>

    <!-- JavaScript code directly calls the API -->
    <script>
        // --- CONFIGURATION ---
        const API_KEY = "QUxMIFPVVlgqFTRSBBUkUgQkVMT("; // Apni poori API key yahan dalein
        const BASE_URL = "https://stock.indianapi.in";
        
        // Jin companies ko aap track karna chahte hain unke naam ki list
        const TRACKED_STOCKS = ["Tata Power", "Reliance", "L&T", "Suzlon", "BHEL", "Adani Green", "KPI Green"];

        document.getElementById('scanBtn').addEventListener('click', scanMarket);
        window.onload = scanMarket;

        async function scanMarket() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('stockContainer');
            
            loader.style.display = 'block';
            container.innerHTML = '';

            let companyFound = false;

            // Keywords jo hum news/announcements mein dhoondhenge
            const keywords = ["order", "deal", "project", "contract", "awarded", "secures", "mou", "agreement"];

            for (const stock of TRACKED_STOCKS) {
                try {
                    const response = await fetch(`${BASE_URL}/stock?name=${encodeURIComponent(stock)}`, {
                        method: 'GET',
                        headers: {
                            'x-api-key': API_KEY,
                            'Accept': 'application/json'
                        }
                    });

                    if (response.status === 200) {
                        const data = await response.json();
                        const currentPrice = data.currentPrice || "N/A";
                        const percentChange = data.percentChange || 0;
                        const recentNews = data.recentNews || [];

                        let matchingDeals = [];

                        // News filter kar rahe hain keywords ke basis par
                        recentNews.forEach(news => {
                            const title = (news.title || "").toLowerCase();
                            const desc = (news.description || "").toLowerCase();

                            if (keywords.some(kw => title.includes(kw) || desc.includes(kw))) {
                                matchingDeals.push({
                                    title: news.title,
                                    date: news.date || "Recent",
                                    url: news.url || "#"
                                });
                            }
                        });

                        // Agar koi deal mili, toh hi card screen par dikhega (Selection Logic)
                        if (matchingDeals.length > 0) {
                            companyFound = true;
                            const changeClass = parseFloat(percentChange) >= 0 ? 'text-success' : 'text-danger';
                            
                            let dealListHTML = '';
                            matchingDeals.forEach(deal => {
                                dealListHTML += `
                                    <li class="list-group-item bg-dark text-light border-secondary">
                                        <a href="${deal.url}" target="_blank" class="text-decoration-none text-info">
                                            📢 ${deal.title}
                                        </a> <br>
                                        <small class="text-muted">Date: ${deal.date}</small>
                                    </li>`;
                            });

                            const cardHTML = `
                                <div class="col-md-6 col-lg-4">
                                    <div class="card shadow-lg">
                                        <div class="card-body">
                                            <h5 class="card-title text-warning fw-bold">${stock}</h5>
                                            <div class="d-flex justify-content-between mb-3">
                                                <span>Price: <strong>₹${currentPrice}</strong></span>
                                                <span class="${changeClass} fw-bold">${percentChange}%</span>
                                            </div>
                                            <h6 class="text-white-50 border-bottom pb-2">🎯 Selected Due to Project/Deal:</h6>
                                            <ul class="list-group list-group-flush">
                                                ${dealListHTML}
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            `;
                            container.innerHTML += cardHTML;
                        }
                    }
                } catch (error) {
                    console.error(`Error scanning ${stock}:`, error);
                }
            }

            loader.style.display = 'none';

            if (!companyFound) {
                container.innerHTML = `
                    <div class="col-12 text-center">
                        <p class="text-muted fs-5">Filhaal kisi bhi tracked stock mein koi nayi deal ya project announcement nahi mili.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
